# PostgreSQL Performance Tuning
# For a small social media workload on a VPS with 2-4 GB RAM
# Adjust shared_buffers / effective_cache_size to ~25% / 75% of available RAM

listen_addresses = '*'
max_connections = 100

# ─── Memory ───────────────────────────────────────────────────────────────────
shared_buffers = 256MB          # 25% of 1GB RAM — increase for larger servers
effective_cache_size = 768MB    # OS page cache estimate
work_mem = 8MB                  # per sort/hash operation; watch for spills
maintenance_work_mem = 64MB

# ─── WAL ──────────────────────────────────────────────────────────────────────
wal_buffers = 16MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min

# ─── Query Planning ──────────────────────────────────────────────────────────
random_page_cost = 1.1          # Assume SSD storage
effective_io_concurrency = 200

# ─── Logging ──────────────────────────────────────────────────────────────────
log_min_duration_statement = 500  # Log slow queries > 500ms
log_line_prefix = '%t [%p] %u@%d '
log_timezone = 'UTC'

# ─── Locale ──────────────────────────────────────────────────────────────────
timezone = 'UTC'
default_text_search_config = 'pg_catalog.simple'
